services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: production_site_crawler
      POSTGRES_USER: crawler
      POSTGRES_PASSWORD: crawler
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U crawler -d production_site_crawler']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
